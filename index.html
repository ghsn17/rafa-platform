<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رأفة الوطنية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #123e1a; --bg: #f4f7f4; --c: #fff; --t: #2d3748; --sub: #718096; }
        [data-theme="dark"] { --bg: #0b1a0e; --c: #122617; --t: #f7fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--t); margin:0; padding-bottom:30px; }
        .nav { background: var(--p); color: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-v { background: #ecc94b; border:0; padding: 6px 12px; border-radius: 20px; font-family:'Cairo'; font-size:11px; font-weight:bold; cursor:pointer; }
        .container { max-width: 480px; margin: 0 auto; padding: 10px; }
        .stats { background: var(--c); border-radius: 12px; padding: 12px; display: flex; justify-content: space-around; text-align: center; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px; }
        .stat-num { color: #ecc94b; font-size: 16px; font-weight: bold; }
        
        /* تحديث الكرت ليتناسب مع الصورة */
        .card { background: var(--c); border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); overflow: hidden; }
        .card-body { padding: 15px; }
        
        /* نمط صورة الحالة الفخم */
        .case-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid rgba(0,0,0,0.05); display: block; }
        
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #fff5f5; color: #e53e3e; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .imp { background: rgba(236,201,75,0.1); border-right: 3px solid #ecc94b; padding: 8px; font-size: 11px; margin: 10px 0; border-radius: 0 4px 4px 0; }
        
        .case-quick-donate { background: linear-gradient(135deg, var(--p), #0b2911); color: #fff; border-radius: 12px; padding: 12px; margin: 12px 0; display: flex; flex-direction: column; align-items: center; }
        .q-btns { display: flex; gap: 6px; width: 100%; margin: 8px 0; }
        .q-btn { flex: 1; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px; border-radius: 6px; cursor: pointer; font-family: 'Cairo'; font-size: 11px; font-weight: bold; }
        .q-btn.active, .q-btn:hover { background: #fff; color: var(--p); }
        .q-in { width: 100%; padding: 8px; border-radius: 6px; border: none; text-align: center; font-family: 'Cairo'; font-size: 11px; margin-bottom: 8px; box-sizing: border-box; }
        
        /* نمط واجهة الإهداء الذكية داخل كرت التبرع */
        .gift-section { width: 100%; text-align: right; margin-bottom: 10px; display: none; background: rgba(255,255,255,0.08); padding: 8px; border-radius: 6px; box-sizing: border-box; }
        .gift-label { font-size: 11px; color: #ecc94b; font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .gift-fields { display: none; margin-top: 8px; gap: 6px; flex-direction: column; width: 100%; }
        .gift-in { width: 100%; padding: 6px; border-radius: 4px; border: none; font-family: 'Cairo'; font-size: 11px; box-sizing: border-box; }

        .btn-submit { background: #cbd5e0; color: #718096; border:0; width:100%; padding: 10px; border-radius: 8px; font-family:'Cairo'; font-weight:bold; cursor: not-allowed; font-size: 13px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; transition: 0.3s; }
        .btn-submit.ready { background: #ecc94b; color: #1a202c; cursor: pointer; }

        .ring-wrap { position: relative; width: 60px; height: 60px; }
        .ring { transform: rotate(-90deg); transform-origin: 30px 30px; }
        .ring-txt { position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); font-weight:bold; font-size:12px; }
        
        .bank { background: rgba(0,0,0,0.02); border: 1px dashed var(--sub); padding: 10px; border-radius: 8px; font-size: 11px; margin-top:12px; }
        .btn-wa { background: #123e1a; color: #fff; border:1px solid rgba(255,255,255,0.1); width:100%; padding: 12px; border-radius: 10px; font-family:'Cairo'; font-weight:bold; margin-top: 10px; text-align:center; text-decoration:none; display:block; box-sizing: border-box; font-size: 13px; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:100; }
        .m-box { background: var(--c); padding: 20px; border-radius: 16px; width: 85%; max-width: 340px; }
        input.v-input { width:100%; padding:10px; margin: 6px 0; border:1px solid #cbd5e0; border-radius:8px; box-sizing:border-box; font-family:'Cairo'; font-size:12px; background: var(--c); color: var(--t); }
        
        .admin-panel { background: var(--c); border: 2px solid var(--p); border-radius: 16px; padding: 15px; margin-top: 15px; display: none; }
        .admin-trigger { background: none; border: none; color: var(--sub); font-size: 11px; cursor: pointer; margin: 25px auto 0 auto; display: block; font-family: 'Cairo'; }
        .admin-tools { margin-top: 10px; border-top: 1px dashed var(--sub); padding-top: 8px; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div class="nav">
        <strong>منصة رأفة الخيرية</strong>
        <div style="display: flex; gap: 8px;">
            <button class="btn-v" onclick="openM()">🤝 تطوع معنا</button>
            <button class="btn-v" style="background:rgba(255,255,255,0.2); color:#fff; padding: 6px 10px;" onclick="toggleT()">🌙</button>
        </div>
    </div>

    <div class="container">
        
        <div class="stats">
            <div><div class="stat-num" id="totalStatsDisplay">٣٢٥,٠٠٠ ج</div><div style="font-size:11px; color:var(--sub);">إجمالي التبرعات الحالية</div></div>
            <div><div class="stat-num" id="completedCountDisplay">٠</div><div style="font-size:11px; color:var(--sub);">حالات اكتملت</div></div>
        </div>

        <div id="cases-list"></div>

        <div id="admin-panel" class="admin-panel">
            <h3 style="margin-top:0; font-size:14px; color:var(--p);">🔐 لوحة الإشراف والمتابعة</h3>
            <input type="text" id="newCaseTitle" class="v-input" placeholder="عنوان الحالة...">
            <input type="text" id="newCaseImage" class="v-input" placeholder="رابط صورة الحالة (اختياري)...">
            <input type="text" id="newCaseDesc" class="v-input" placeholder="وصف وتفاصيل الحالة الإنسانية...">
            <input type="text" id="newCaseImpact" class="v-input" placeholder="أثر السهم المتوقع...">
            <input type="number" id="newCaseTarget" class="v-input" placeholder="المبلغ المستهدف (جنيه)...">
            <button class="btn-submit ready" onclick="createNewCase()">نشر الحالة فوراً</button>
        </div>

        <button class="admin-trigger" onclick="unlockAdmin()">🔐 دخول المشرفين</button>
    </div>

    <div id="vModal" class="modal">
        <div class="m-box">
            <h3 style="margin-top:0; color:var(--p); font-size:14px;">🤝 انضمام سفراء الخير</h3>
            <input type="text" id="vName" class="v-input" placeholder="الاسم الكامل...">
            <input type="tel" id="vPhone" class="v-input" placeholder="رقم الهاتف...">
            <a id="volWaLink" class="btn-submit" target="_blank" onclick="return sendVolWA()">إرسال الطلب ✨</a>
            <button class="btn-submit ready" style="background:#e53e3e; color:#fff; margin-top:6px;" onclick="closeM()">إغلاق</button>
        </div>
    </div>

    <script>
        let selectedAmt = 0;
        let isLogged = false;
        let cases = [];
        const adminPhone = "249904284874";

        // إدراج صورة افتراضية للمبادرة الأولى لتبدو جميلة فوراً
        const defaultCases = [
            { id: 1, title: 'كفالة أسر متعففة (مبادرة رأفة)', image: 'https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=500', desc: 'توفير السلال الغذائية والاحتياجات الأساسية لـ 20 أسرة متعففة ومتضررة.', impact: 'تبرعك يضمن بقاء هذه الأسر بكرامة وتأمين قوت يومهم الأساسي.', target: 500000, raised: 325000, completed: false }
        ];

        function toggleT() {
            let b = document.documentElement;
            b.getAttribute('data-theme') === 'dark' ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
        }
        function copyN() { navigator.clipboard.writeText('5270255').then(() => alert('🚀 تم نسخ رقم الحساب!')); }
        function openM() { 
            document.getElementById('vModal').style.display = 'flex';
            document.getElementById('volWaLink').classList.remove('ready');
            document.getElementById('vName').oninput = checkVolInputs;
            document.getElementById('vPhone').oninput = checkVolInputs;
        }
        function closeM() { document.getElementById('vModal').style.display = 'none'; }
        
        function loadData() {
            const saved = localStorage.getItem('rafa_cases_data');
            cases = saved ? JSON.parse(saved) : [...defaultCases];
            if(!saved) saveData();
            render();
        }
        function saveData() { localStorage.setItem('rafa_cases_data', JSON.stringify(cases)); }

        function render() {
            const list = document.getElementById('cases-list');
            list.innerHTML = '';

            cases.forEach(c => {
                let pct = c.completed ? 100 : Math.round((c.raised / c.target) * 100);
                if(pct > 100) pct = 100;
                let remaining = Math.max(0, c.target - c.raised);

                let badge = c.completed ? '<span class="badge" style="background:#f0fff4; color:#38a169;">مكتملة ✅</span>' : '<span class="badge">حالة نشطة 🔥</span>';
                
                // التحقق من وجود صورة للحالة أو وضع مساحة فارغة
                let imgTag = c.image ? `<img src="${c.image}" class="case-img" alt="صورة الحالة">` : '';

                let donateSection = c.completed 
                    ? `<div style="background:#f0fff4; color:#38a169; text-align:center; padding:10px; border-radius:10px; font-weight:bold; font-size:12px; margin-top:10px;">🎉 تم اكتمال الحالة بالكامل وجزاكم الله خيراً!</div>`
                    : `<div class="case-quick-donate">
                        <span style="font-size:11px; font-weight:bold;">التبرع السريع للحالة ⚡</span>
                        <div class="q-btns">
                            <button class="q-btn" onclick="setQ(5000, this)">5,000 ج</button>
                            <button class="q-btn" onclick="setQ(10000, this)">10,000 ج</button>
                            <button class="q-btn" onclick="setQ(20000, this)">20,000 ج</button>
                        </div>
                        <input type="number" class="q-in" placeholder="أو أدخل مبلغاً آخر هنا..." oninput="checkInput(this)">
                        
                        <!-- إضافة قسم الإهداء الذكي -->
                        <div class="gift-section">
                            <label class="gift-label">
                                <input type="checkbox" class="gift-check" onchange="toggleGiftFields(this)"> أرغب في جعل هذا التبرع إهداءً 🎁
                            </label>
                            <div class="gift-fields">
                                <input type="text" class="gift-in donor-name" placeholder="اسم المُهدي (مثال: فاعل خير)...">
                                <input type="text" class="gift-in rec-name" placeholder="إلى (اسم المُهدى إليه)...">
                            </div>
                        </div>

                        <a href="#" target="_blank" class="btn-submit" onclick="return triggerDonateWA(this, '${c.title}')">تم التبرع لهذه الحالة</a>
                       </div>`;

                let adminTools = (isLogged && !c.completed)
                    ? `<div class="admin-tools">
                        <button class="btn-v" style="background:#38a169; color:#fff;" onclick="markDone(${c.id})">✔ إغلاق</button>
                        <input type="number" style="width:50%; margin:0; padding:4px;" id="silent-${c.id}" placeholder="تحديث المبلغ المستلم...">
                        <button class="btn-v" style="background:#dd6b20; color:#fff;" onclick="addSilent(${c.id})">➕</button>
                       </div>`
                    : '';

                list.innerHTML += `
                    <div class="card">
                        ${imgTag}
                        <div class="card-body">
                            <div class="flex"><h3 style="margin:0; font-size:14px; color:var(--p);">${c.title}</h3>${badge}</div>
                            <p style="font-size:11px; color:var(--sub); margin: 6px 0;">${c.desc}</p>
                            <div class="imp"><strong>أثر السهم:</strong> ${c.impact}</div>
                            <div class="flex" style="margin:12px 0; background:rgba(0,0,0,0.01); padding:8px; border-radius:8px;">
                                <div style="font-size:11px;">
                                    <div>المتبقي: <strong>${remaining.toLocaleString()} ج</strong></div>
                                    <div style="color:var(--sub); margin-top:2px;">المستهدف: ${c.target.toLocaleString()} ج</div>
                                </div>
                                <div class="ring-wrap">
                                    <svg width="60" height="60">
                                        <circle stroke="rgba(0,0,0,0.05)" stroke-width="4" fill="transparent" r="24" cx="30" cy="30"/>
                                        <circle stroke="var(--p)" stroke-width="4" stroke-dasharray="150" stroke-dashoffset="${150 - (pct/100)*150}" fill="transparent" r="24" cx="30" cy="30" class="ring"/>
                                    </svg>
                                    <div class="ring-txt">${pct}%</div>
                                </div>
                            </div>
                            ${donateSection}
                            <div class="bank flex">
                                <div><strong>تحويل بنكك:</strong> 5270255 <br><small style="color:var(--sub)">باسم: ميثاق عمر محمود</small></div>
                                <button style="background:var(--p); color:#fff; border:0; padding:4px 10px; border-radius:4px; cursor:pointer; font-family:'Cairo'; font-size:11px;" onclick="copyN()">نسخ</button>
                            </div>
                            <a href="https://api.whatsapp.com/send?phone=${adminPhone}&text=${encodeURIComponent('السلام عليكم، أود الاستفسار والمتابعة مع إدارة منصة رأفة.')}" class="btn-wa" target="_blank">تواصل للاستفسار 💬</a>
                            ${adminTools}
                        </div>
                    </div>`;
            });
            updateStats();
        }

        function setQ(amt, btn) {
            let p = btn.closest('.case-quick-donate');
            p.querySelector('.q-in').value = amt;
            selectedAmt = amt;
            p.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            p.querySelector('.btn-submit').classList.add('ready');
            p.querySelector('.gift-section').style.display = 'block'; // إظهار خيار الإهداء
        }

        function checkInput(el) {
            selectedAmt = Number(el.value);
            let p = el.closest('.case-quick-donate');
            let btn = p.querySelector('.btn-submit');
            if(selectedAmt > 0) { 
                btn.classList.add('ready'); 
                p.querySelector('.gift-section').style.display = 'block'; // إظهار خيار الإهداء
            } 
            else { 
                btn.classList.remove('ready'); 
                p.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
                p.querySelector('.gift-section').style.display = 'none'; // إخفاء الإهداء إذا صفر المبلغ
            }
        }

        // دالة إظهار وإخفاء حقول الإهداء
        function toggleGiftFields(chk) {
            let fields = chk.closest('.gift-section').querySelector('.gift-fields');
            fields.style.display = chk.checked ? 'flex' : 'none';
        }

        // تحديث رسالة الواتساب الفخمة لتشمل بيانات الإهداء إذا تم تحديدها
        function triggerDonateWA(anchor, title) {
            if(selectedAmt <= 0) return false;
            let p = anchor.closest('.case-quick-donate');
            let isGift = p.querySelector('.gift-check').checked;
            
            let text = `السلام عليكم، تم التبرع بمبلغ ${selectedAmt.toLocaleString()} جنيه لحالة (${title}) وجاري إرسال إشعار التحويل المالي.`;
            
            if(isGift) {
                let donor = p.querySelector('.donor-name').value || "فاعل خير";
                let recipient = p.querySelector('.rec-name').value || "من يحب";
                text += `\n\n🎁 [ هذا التبرع عبارة عن إهداء ]\n• من: ${donor}\n• إلى: ${recipient}`;
            }

            anchor.href = "https://api.whatsapp.com/send?phone=" + adminPhone + "&text=" + encodeURIComponent(text);
            return true;
        }

        function checkVolInputs() {
            let n = document.getElementById('vName').value;
            let p = document.getElementById('vPhone').value;
            let link = document.getElementById('volWaLink');
            if(n && p) { link.classList.add('ready'); } else { link.classList.remove('ready'); }
        }

        function sendVolWA() {
            let n = document.getElementById('vName').value;
            let p = document.getElementById('vPhone').value;
            if(!n || !p) return false;
            let text = `طلب انضمام سفراء الخير:\nالاسم الكامل: ${n}\nرقم الهاتف: ${p}`;
            document.getElementById('volWaLink').href = "https://api.whatsapp.com/send?phone=" + adminPhone + "&text=" + encodeURIComponent(text);
            setTimeout(closeM, 500);
            return true;
        }

        function unlockAdmin() {
            let pass = prompt("🔑 الرمز السري للمشرفين:");
            if(pass === "5270255") { isLogged = true; document.getElementById('admin-panel').style.display = 'block'; render(); } 
            else { alert("الرمز خطأ! ❌"); }
        }

        function createNewCase() {
            let t = document.getElementById('newCaseTitle').value;
            let img = document.getElementById('newCaseImage').value; // جلب رابط الصورة الجديد
            let d = document.getElementById('newCaseDesc').value;
            let i = document.getElementById('newCaseImpact').value;
            let tg = document.getElementById('newCaseTarget').value;
            if(!t || !tg) return;
            cases.push({ id: cases.length+1, title: t, image: img, desc: d, impact: i, target: Number(tg), raised: 0, completed: false });
            saveData(); render();
            document.getElementById('newCaseTitle').value=''; document.getElementById('newCaseImage').value=''; document.getElementById('newCaseDesc').value=''; document.getElementById('newCaseImpact').value=''; document.getElementById('newCaseTarget').value='';
        }

        function addSilent(id) {
            let val = Number(document.getElementById(`silent-${id}`).value);
            let c = cases.find(item => item.id === id);
            if(c && val > 0) { c.raised += val; if(c.raised >= c.target) c.completed = true; saveData(); render(); }
        }

        function markDone(id) { let c = cases.find(item => item.id === id); if(c) { c.completed = true; saveData(); render(); } }

        function updateStats() {
            let total = cases.reduce((sum, c) => sum + c.raised, 0);
            let comp = cases.filter(c => c.completed).length;
            document.getEleme
