<!-- باقي رأس الصفحة كما هو، لكن هذه هي الأجزاء المهمة -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // إعدادات Firebase الخاصة بك - ضع بياناتك هنا
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    // ... باقي الإعدادات
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let casesData = [];
  let ambassadorsData = [];

  // دالة حفظ البيانات إلى Firebase (مستند واحد)
  async function updateFirebaseLive() {
    try {
      const mainDocRef = doc(db, "appData", "main");
      await setDoc(mainDocRef, {
        cases: casesData,
        ambassadors: ambassadorsData,
        lastUpdated: new Date().toISOString()
      });
      showToastNoticeLive("💾 تم الحفظ سحابياً");
    } catch (error) {
      console.error("خطأ في الحفظ:", error);
      alert("حدث خطأ أثناء الحفظ");
    }
  }

  // دالة تحميل البيانات من Firebase (تُستخدم عند بدء التطبيق)
  async function loadFromFirebase() {
    try {
      const mainDocRef = doc(db, "appData", "main");
      const docSnap = await getDoc(mainDocRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        casesData = data.cases || [];
        ambassadorsData = data.ambassadors || [];
      } else {
        // بيانات أولية إذا كانت المستند غير موجود
        casesData = [];
        ambassadorsData = [];
      }
      renderCases(); // افترض أن لديك دالة لعرض الحالات
      renderAmbassadors(); // افترض أن لديك دالة لعرض السفراء
    } catch (error) {
      console.error("خطأ في التحميل:", error);
    }
  }

  // استماع فوري للتغييرات (اختياري - لجعل التحديث فورياً بين الأجهزة)
  function listenToFirebase() {
    const mainDocRef = doc(db, "appData", "main");
    onSnapshot(mainDocRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        casesData = data.cases || [];
        ambassadorsData = data.ambassadors || [];
        renderCases();
        renderAmbassadors();
      }
    });
  }

  // دوال العرض (أضفها حسب تصميم صفحتك)
  function renderCases() {
    // هنا كود عرض الحالات في الجدول أو القائمة
    console.log("تم تحديث الحالات:", casesData);
  }
  function renderAmbassadors() { /* مشابه */ }

  // دالة الإضافة الجديدة (المُصححة)
  window.addNewCaseLive = function() {
    const title = document.getElementById('newCaseTitle').value.trim();
    const target = Number(document.getElementById('newCaseTarget').value);
    if (title && target > 0) {
      const newCase = {
        id: Date.now(),
        title: title,
        target: target,
        raised: 0,
        completed: false
      };
      casesData.push(newCase);
      updateFirebaseLive().then(() => {
        // بعد الحفظ نحدد العرض المباشر
        renderCases();
        document.getElementById('newCaseTitle').value = '';
        document.getElementById('newCaseTarget').value = '';
        showToastNoticeLive("🚀 تم النشر سحابياً بنجاح!");
        switchAdminSubTab('view');
      });
    } else {
      alert("الرجاء إدخال عنوان وقيمة صحيحة");
    }
  };

  // تصحيح دالة markCaseCompletedLive
  window.markCaseCompletedLive = function(index) {
    if (confirm(`هل تريدين نقل ملف "${casesData[index].title}" إلى أرشيف الحصاد المكتمل كُلياً؟`)) {
      casesData[index].raised = casesData[index].target;
      casesData[index].completed = true;
      updateFirebaseLive();
    }
  };

  // تصحيح deleteCaseLive
  window.deleteCaseLive = function(index) {
    if (confirm("حذف هذه الحالة نهائياً؟")) {
      casesData.splice(index, 1);
      updateFirebaseLive();
    }
  };

  // دوال أخرى (volunteers, ambassadors, theme) مع تصحيح الأخطاء
  window.addAmbassadorLive = function() {
    const input = document.getElementById('newAmbInput');
    const name = input.value.trim();
    if (name) {
      ambassadorsData.push(name);
      updateFirebaseLive();
      input.value = '';
    }
  };

  window.deleteAmbassadorLive = function(idx) {
    if (confirm(`حذف "${ambassadorsData[idx]}"؟`)) {
      ambassadorsData.splice(idx, 1);
      updateFirebaseLive();
    }
  };

  window.submitVolunteerLive = async function() {
    const name = document.getElementById('vName').value.trim();
    const gender = document.getElementById('vGender').value;
    const phone = document.getElementById('vPhone').value.trim();
    if (name.split(/\s+/).length < 3 || !gender || !phone) {
      alert("⚠️ فضلاً، يرجى تعبئة كافة الحالات والاسم ثلاثي.");
      return;
    }
    try {
      const volId = "vol_" + new Date().getTime();
      await setDoc(doc(db, "volunteers_applications", volId), {
        fullName: name,
        gender: gender,
        phone: phone,
        status: "pending",
        timestamp: new Date().toISOString()
      });
    } catch (err) {
      console.error("خطأ أثناء حفظ طلب التطوع: ", err);
    }
    const text = `طلب انضمام جديد لسفراء الخير:\nالاسم: ${name}\nالجنس: ${gender}\nالهاتف: ${phone}`;
    window.open(`https://api.whatsapp.com/send?phone=249904284874&text=${encodeURIComponent(text)}`, '_blank');
    closeVolunteerModal();
  };

  window.toggleThemeLive = function() {
    const docEl = document.documentElement;
    if (docEl.getAttribute('data-theme') === 'dark') {
      docEl.removeAttribute('data-theme');
      localStorage.setItem('rafa_theme_preference', 'light');
    } else {
      docEl.setAttribute('data-theme', 'dark');
      localStorage.setItem('rafa_theme_preference', 'dark');
    }
  };

  window.closeEditModal = function() {
    document.getElementById('editCaseModal').style.display = 'none';
  };
  window.openVolunteerModal = function() {
    document.getElementById('volunteerModal').style.display = 'flex';
  };
  window.closeVolunteerModal = function() {
    document.getElementById('volunteerModal').style.display = 'none';
  };
  function showToastNoticeLive(msg) {
    alert(msg); // أو استخدم مكتبة توست
  }
  function switchAdminSubTab(tab) {
    // حسب الكود الأصلي
  }

  // بدء التطبيق: نحمّل البيانات أولاً ثم نبدأ الاستماع الفوري
  async function initApp() {
    await loadFromFirebase();   // تحميل أولي
    listenToFirebase();         // استماع للتحديثات اللاحقة (تلقائي)
  }

  initApp();
</script>
